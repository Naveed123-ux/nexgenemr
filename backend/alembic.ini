# A generic Alembic configuration file.

[alembic]
# path to migration scripts
script_location = alembic

# template for migration file names
# file_template = %%(rev)s_%%(slug)s

# timezone for revision dates
# timezone =

# title for migration file "slug"
# slug_truncate = 40

# set to 'true' to run the environment script completely
# on every invocation of 'alembic'.
# sourceless = false

# set to 'true' to prevent calling sys.exit() on environment script error.
# raise_on_error = false

# comma separated list of package names to check for versioning tables
# version_locations =

# sqlalchemy.url = driver://user:pass@localhost/dbname
# This will be overridden by env.py using DATABASE_URL environment variable
sqlalchemy.url = postgresql://user:password@localhost:5432/curealog


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S