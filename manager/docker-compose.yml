services:
  # ------------------------------
  # FRONTEND (Dev)
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: emr-frontend
    expose:
      - "3000"
    env_file:
      - .env.frontend
    restart: unless-stopped
    networks:
      - emr-network

  # ------------------------------
  # BACKEND (Dev)
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: emr-backend
    expose:
      - "8000"
    env_file:
      - .env.backend
    restart: unless-stopped
    networks:
      - emr-network

  # ------------------------------
  # DATABASE
  db:
    image: postgres:15-alpine
    container_name: emr-postgres-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: emr_db
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    command: ["postgres", "-c", "listen_addresses=*"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d emr_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - emr-network

  # ------------------------------
  # CADDY (Dev reverse proxy)
  caddy:
    image: caddy:2-alpine
    container_name: emr-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    networks:
      - emr-network

# ------------------------------
# NETWORK & VOLUMES
networks:
  emr-network:
    driver: bridge

volumes:
  postgres_data:
  caddy_data:
  caddy_config: