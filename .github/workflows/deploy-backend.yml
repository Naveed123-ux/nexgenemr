name: Backend CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  # ─── Job 1: Build & Compile (runs on every push to main) ────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

  # ─── Job 2: Docker Build & Push ─────────────────────────────────────────────
  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nex-gen-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push AI Model image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/brainTumor
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nex-gen-ai:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Job 3: Deploy to VPS (runs after docker job passes) ──────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: SSH into VPS and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Login to Docker Hub
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            # Create network if not exists
            docker network create nex-gen-network || true

            # --- 1. Deploy AI Model Container ---
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/nex-gen-ai:latest
            docker stop nex-gen-ai || true
            docker rm nex-gen-ai || true
            docker run -d \
              --name nex-gen-ai \
              --restart unless-stopped \
              --network nex-gen-network \
              -p 8001:8000 \
              ${{ secrets.DOCKERHUB_USERNAME }}/nex-gen-ai:latest

            # --- 2. Deploy Backend Container ---
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/nex-gen-backend:latest
            docker stop nex-gen-backend || true
            docker rm nex-gen-backend || true
            docker run -d \
              --name nex-gen-backend \
              --restart unless-stopped \
              --network nex-gen-network \
              --add-host host.docker.internal:host-gateway \
              -p ${{ secrets.PORT || 8000 }}:8000 \
              -e EMR_ENCRYPTION_KEY="${{ secrets.EMR_ENCRYPTION_KEY }}" \
              -e SECRET_KEY="${{ secrets.SECRET_KEY }}" \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e ALGORITHM="${{ secrets.ALGORITHM }}" \
              -e ACCESS_TOKEN_EXPIRE_MINUTES="${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}" \
              -e REFRESH_TOKEN_EXPIRE_DAYS="${{ secrets.REFRESH_TOKEN_EXPIRE_DAYS }}" \
              -e SEQ_SERVER_URL="${{ secrets.SEQ_SERVER_URL }}" \
              -e SEQ_API_KEY="${{ secrets.SEQ_API_KEY }}" \
              -e EMAIL_USER="${{ secrets.EMAIL_USER }}" \
              -e EMAIL_PASS="${{ secrets.EMAIL_PASS }}" \
              -e CLOUDINARY_CLOUD_NAME="${{ secrets.CLOUDINARY_CLOUD_NAME }}" \
              -e CLOUDINARY_API_KEY="${{ secrets.CLOUDINARY_API_KEY }}" \
              -e CLOUDINARY_API_SECRET="${{ secrets.CLOUDINARY_API_SECRET }}" \
              -e GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
              -e GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
              -e GOOGLE_REDIRECT_URI="${{ secrets.GOOGLE_REDIRECT_URI }}" \
              -e GCP_PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}" \
              -e GOOGLE_APPLICATION_CREDENTIALS="${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}" \
              -e GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
              -e STRIPE_SECRET_KEY="${{ secrets.STRIPE_SECRET_KEY }}" \
              -e STRIPE_PUBLISHABLE_KEY="${{ secrets.STRIPE_PUBLISHABLE_KEY }}" \
              -e AI_API_URL="http://nex-gen-ai:8000/predict" \
              ${{ secrets.DOCKERHUB_USERNAME }}/nex-gen-backend:latest

            # Prune unused images to save disk space
            docker image prune -f
